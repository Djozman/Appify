name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Launcher (arm64)
        run: swift build -c release --arch arm64 --product Launcher

      - name: Build Launcher (x86_64)
        run: swift build -c release --arch x86_64 --product Launcher

      - name: Create universal Launcher
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/Launcher \
            .build/x86_64-apple-macosx/release/Launcher \
            -output /tmp/Launcher
          chmod +x /tmp/Launcher

      - name: Embed Launcher into AppifyCore
        run: |
          cp /tmp/Launcher Sources/AppifyCore/Resources/Launcher

      - name: Embed Launcher into Appify
        run: |
          mkdir -p Sources/Appify/Resources
          cp /tmp/Launcher Sources/Appify/Resources/Launcher

      - name: Build AppifyCore
        run: swift build -c release --target AppifyCore

      - name: Build AppifyGUI
        run: swift build -c release --product AppifyGUI

      - name: Build Appify (CLI)
        run: swift build -c release --product Appify
